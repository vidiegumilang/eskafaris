<div class="form-group">
    <label>Flight Date (Tanggal Penerbangan)</label>
    <input type="date" id="flight-date">
</div>

<script>
    // Set default tanggal ke hari ini saat halaman dimuat
    document.getElementById('flight-date').valueAsDate = new Date();

    const aircrafts = ["AEA", "AEB", "AEC", "AED", "AEE", "AEF", "AEG", "AEH", "AEI", "AEJ", "AEK", "AEL", "AEM", "AEN", "AEO", "AEP", "AEQ", "AER"];
    const regEl = document.getElementById('reg');
    aircrafts.forEach(r => regEl.innerHTML += `<option value="${r}">PK-${r}</option>`);

    function saveData() {
        const data = JSON.parse(localStorage.getItem('flightDB') || '{}');
        const date = document.getElementById('flight-date').value; // Ambil Tanggal
        const r = regEl.value;
        const p = document.getElementById('period').value;

        if(!date) {
            alert("Pilih tanggal terlebih dahulu!");
            return;
        }

        // Format KEY baru: TANGGAL-REG-PERIODE-KOLOM
        const fields = ['fi', 'std', 'exc', 'off', 'on', 'rmk', 'crs'];
        fields.forEach((f) => {
            const val = document.getElementById(f).value;
            // Key sekarang menyertakan tanggal agar data tidak tertimpa di hari berbeda
            data[`${date}-${r}-${p}-${f}`] = val;
        });

        localStorage.setItem('flightDB', JSON.stringify(data));
        alert(`Data PK-${r} untuk tanggal ${date} berhasil disimpan!`);
    }
</script>
