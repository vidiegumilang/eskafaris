<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Update Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<nav>
    <div class="nav-brand">⚙️ ADMIN PANEL</div>
    <div class="nav-links">
        <a href="index.html">LIHAT DASHBOARD</a>
        <a href="admin.html" class="active">INPUT DATA</a>
    </div>
</nav>

<div class="container">
    <div class="admin-card">
        <h2 style="margin-top: 0; color: var(--primary);">Update Flight Entry</h2>
        <p style="font-size: 0.9rem; color: #666;">Silakan perbarui jadwal penerbangan di bawah ini.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <div class="input-grid">
            <div class="form-group">
                <label>1. Registrasi Pesawat</label>
                <select id="reg"></select>
            </div>
            <div class="form-group">
                <label>2. Pilih Periode</label>
                <select id="period">
                    <option value="0">1ST PERIOD (01:00-02:00)</option>
                    <option value="1">2ND PERIOD (02:30-03:30)</option>
                    <option value="2">3RD PERIOD (04:00-05:00)</option>
                    <option value="3">REST PERIOD (05:00-06:00)</option>
                    <option value="4">4TH PERIOD (06:30-07:30)</option>
                    <option value="5">5TH PERIOD (08:00-09:00)</option>
                    <option value="6">6TH PERIOD (09:30-10:30)</option>
                    <option value="7">7TH PERIOD (11:00-12:00)</option>
                </select>
            </div>
        </div>

        <div class="input-grid">
            <div class="form-group"><label>3. Instruktur (FI)</label><input type="text" id="fi" placeholder="JORDAN"></div>
            <div class="form-group"><label>4. Nama Siswa (STD)</label><input type="text" id="std"></div>
            <div class="form-group"><label>5. Stage/EXC</label><input type="text" id="exc" placeholder="B15"></div>
            <div class="form-group"><label>6. Course (CRS)</label><input type="text" id="crs" placeholder="PNB 7"></div>
        </div>

        <div class="input-grid">
            <div class="form-group"><label>Block OFF</label><input type="time" id="off"></div>
            <div class="form-group"><label>Block ON</label><input type="time" id="on"></div>
            <div class="form-group"><label>Remark (RMK)</label><input type="text" id="rmk" placeholder="OK/Maintenance"></div>
        </div>

        <button class="btn-update" onclick="saveData()">Update Dashboard</button>
        
        <div style="margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: center;">
            <button onclick="clearAllData()" style="background: none; border: none; color: #e74c3c; cursor: pointer; text-decoration: underline; font-size: 12px;">
                Reset Semua Jadwal
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    function clearAllData() {
        if (confirm("Hapus semua data jadwal?")) {
            localStorage.removeItem('flightDB');
            alert("Data dikosongkan.");
            location.reload();
        }
    }
</script>
</body>
</html>
