<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Update Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<nav>
    <div style="font-size: 1.2rem;">⚙️ <strong>ADMIN</strong> PANEL</div>
    <div>
        <a href="index.html">LIHAT DASHBOARD</a>
        <a href="admin.html" style="border-bottom: 2px solid var(--accent);">INPUT DATA</a>
    </div>
</nav>

<div class="container">
    <div class="admin-card">
        <h2 style="margin-top: 0; color: var(--primary);">Update Flight Entry</h2>
        <p style="font-size: 0.9rem; color: #666;">Pilih pesawat dan periode untuk memperbarui data di monitor.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <div class="input-grid">
            <div class="form-group">
                <label>1. Registrasi Pesawat</label>
                <select id="reg">
                    </select>
            </div>
            <div class="form-group">
                <label>2. Pilih Periode</label>
                <select id="period">
                    <option value="0">1ST PERIOD (01:00-02:00)</option>
                    <option value="1">2ND PERIOD (02:30-03:30)</option>
                    <option value="2">3RD PERIOD (04:00-05:00)</option>
                    <option value="3">REST PERIOD (05:00-06:00)</option>
                    <option value="4">4TH PERIOD (06:30-07:30)</option>
                    <option value="5">5TH PERIOD (08:00-09:00)</option>
                    <option value="6">6TH PERIOD (09:30-10:30)</option>
                    <option value="7">7TH PERIOD (11:00-12:00)</option>
                </select>
            </div>
        </div>

        <div class="input-grid">
            <div class="form-group">
                <label>3. Instruktur (FI)</label>
                <input type="text" id="fi" placeholder="Contoh: FD - JORDAN">
            </div>
            <div class="form-group">
                <label>4. Nama Siswa (STD)</label>
                <input type="text" id="std" placeholder="Nama Siswa">
            </div>
            <div class="form-group">
                <label>5. Stage/Exercise (EXC)</label>
                <input type="text" id="exc" placeholder="Contoh: B15">
            </div>
            <div class="form-group">
                <label>6. Course (CRS)</label>
                <input type="text" id="crs" placeholder="Contoh: PNB 7">
            </div>
        </div>

        <div class="input-grid">
            <div class="form-group">
                <label>Block OFF</label>
                <input type="time" id="off">
            </div>
            <div class="form-group">
                <label>Block ON</label>
                <input type="time" id="on">
            </div>
            <div class="form-group">
                <label>Remark (RMK)</label>
                <input type="text" id="rmk" placeholder="OK / Delay / Maintenance">
            </div>
        </div>

        <button class="btn-update" onclick="saveData()">Update ke Dashboard</button>
        
        <div style="margin-top: 20px; text-align: center;">
            <button onclick="clearAllData()" style="background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.8rem; text-decoration: underline;">
                Reset Semua Jadwal (Hapus Semua)
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    // Fungsi tambahan untuk menghapus semua data jika diperlukan
    function clearAllData() {
        if (confirm("Apakah Anda yakin ingin menghapus SELURUH jadwal?")) {
            localStorage.removeItem('flightDB');
            alert("Semua data telah dihapus.");
            location.reload();
        }
    }
</script>
</body>
</html>
