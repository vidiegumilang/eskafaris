<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Update Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<nav>
    <div class="nav-brand">⚙️ ADMIN PANEL</div>
    <div class="nav-links">
        <a href="index.html">LIHAT DASHBOARD</a>
        <a href="admin.html" class="active">INPUT DATA</a>
    </div>
</nav>

<div class="container">
    <div class="admin-card">
        <h2 style="margin-top: 0; color: var(--primary);">Update Flight Entry</h2>
        <p style="font-size: 0.9rem; color: #666;">Pilih tanggal, pesawat, dan periode untuk memperbarui jadwal.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="color: #e67e22;">📅 Tanggal Penerbangan</label>
            <input type="date" id="flight-date" style="border: 2px solid #e67e22;">
        </div>

        <div class="input-grid">
            <div class="form-group">
                <label>1. Registrasi Pesawat</label>
                <select id="reg">
                    <option value="AEA">PK-AEA</option><option value="AEB">PK-AEB</option>
                    <option value="AEC">PK-AEC</option><option value="AED">PK-AED</option>
                    <option value="AEE">PK-AEE</option><option value="AEF">PK-AEF</option>
                    <option value="AEG">PK-AEG</option><option value="AEH">PK-AEH</option>
                    <option value="AEI">PK-AEI</option><option value="AEJ">PK-AEJ</option>
                    <option value="AEK">PK-AEK</option><option value="AEL">PK-AEL</option>
                    <option value="AEM">PK-AEM</option><option value="AEN">PK-AEN</option>
                    <option value="AEO">PK-AEO</option><option value="AEP">PK-AEP</option>
                    <option value="AEQ">PK-AEQ</option><option value="AER">PK-AER</option>
                </select>
            </div>
            <div class="form-group">
                <label>2. Pilih Periode</label>
                <select id="period">
                    <option value="0">1ST PERIOD (01:00-02:00)</option>
                    <option value="1">2ND PERIOD (02:30-03:30)</option>
                    <option value="2">3RD PERIOD (04:00-05:00)</option>
                    <option value="3">REST PERIOD (05:00-06:00)</option>
                    <option value="4">4TH PERIOD (06:30-07:30)</option>
                    <option value="5">5TH PERIOD (08:00-09:00)</option>
                    <option value="6">6TH PERIOD (09:30-10:30)</option>
                    <option value="7">7TH PERIOD (11:00-12:00)</option>
                </select>
            </div>
        </div>

        <div class="input-grid">
            <div class="form-group">
                <label>3. Instruktur (FI)</label>
                <input type="text" id="fi" placeholder="Contoh: FD - JORDAN">
            </div>
            <div class="form-group">
                <label>4. Nama Siswa (STD)</label>
                <input type="text" id="std" placeholder="Nama Siswa">
            </div>
            <div class="form-group">
                <label>5. Stage/Exercise (EXC)</label>
                <input type="text" id="exc" placeholder="Contoh: B15">
            </div>
        </div>

        <button class="btn-update" onclick="handleSave()">Update ke Dashboard</button>
        
        <div style="margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: center;">
            <button onclick="clearAllData()" style="background: none; border: none; color: #e74c3c; cursor: pointer; text-decoration: underline; font-size: 12px;">
                Reset Semua Jadwal (Semua Tanggal)
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    // Set default tanggal ke hari ini saat halaman dimuat
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('flight-date').valueAsDate = new Date();
    });

    function handleSave() {
        const date = document.getElementById('flight-date').value;
        if (!date) {
            alert("Harap pilih tanggal terlebih dahulu!");
            return;
        }
        
        // Memanggil fungsi saveData yang ada di script.js
        // Pastikan script.js Anda sudah mendukung parameter date
        saveData(date); 
    }

    function clearAllData() {
        if (confirm("Hapus semua data jadwal (seluruh tanggal) di memori browser?")) {
            localStorage.removeItem('flightDB');
            alert("Memori berhasil dikosongkan.");
            location.reload();
        }
    }
</script>
</body>
</html>
