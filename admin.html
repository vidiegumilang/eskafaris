<div class="container">
    <div class="admin-card">
        <h2 style="margin-top: 0; color: var(--primary);">Update Flight Entry</h2>
        <p style="font-size: 0.9rem; color: #666;">Masukkan detail penerbangan dasar di bawah ini.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <div class="input-grid">
            <div class="form-group">
                <label>1. Registrasi Pesawat</label>
                <select id="reg">
                    <option value="AEA">PK-AEA</option>
                    <option value="AEB">PK-AEB</option>
                    <option value="AEC">PK-AEC</option>
                    <option value="AED">PK-AED</option>
                    <option value="AEE">PK-AEE</option>
                    <option value="AEF">PK-AEF</option>
                    <option value="AEG">PK-AEG</option>
                    <option value="AEH">PK-AEH</option>
                    <option value="AEI">PK-AEI</option>
                    <option value="AEJ">PK-AEJ</option>
                    <option value="AEK">PK-AEK</option>
                    <option value="AEL">PK-AEL</option>
                    <option value="AEM">PK-AEM</option>
                    <option value="AEN">PK-AEN</option>
                    <option value="AEO">PK-AEO</option>
                    <option value="AEP">PK-AEP</option>
                    <option value="AEQ">PK-AEQ</option>
                    <option value="AER">PK-AER</option>
                </select>
            </div>
            <div class="form-group">
                <label>2. Pilih Periode</label>
                <select id="period">
                    <option value="0">1ST PERIOD (01:00-02:00)</option>
                    <option value="1">2ND PERIOD (02:30-03:30)</option>
                    <option value="2">3RD PERIOD (04:00-05:00)</option>
                    <option value="3">REST PERIOD (05:00-06:00)</option>
                    <option value="4">4TH PERIOD (06:30-07:30)</option>
                    <option value="5">5TH PERIOD (08:00-09:00)</option>
                    <option value="6">6TH PERIOD (09:30-10:30)</option>
                    <option value="7">7TH PERIOD (11:00-12:00)</option>
                </select>
            </div>
        </div>

        <div class="input-grid">
            <div class="form-group">
                <label>3. Instruktur (FI)</label>
                <input type="text" id="fi" placeholder="Contoh: FD - JORDAN">
            </div>
            <div class="form-group">
                <label>4. Nama Siswa (STD)</label>
                <input type="text" id="std" placeholder="Nama Siswa">
            </div>
            <div class="form-group">
                <label>5. Stage/Exercise (EXC)</label>
                <input type="text" id="exc" placeholder="Contoh: B15">
            </div>
        </div>

        <button class="btn-update" onclick="saveData()">Update ke Dashboard</button>
        
        <div style="margin-top: 25px; text-align: center;">
            <button onclick="clearAllData()" style="background: none; border: none; color: #e74c3c; cursor: pointer; text-decoration: underline; font-size: 12px;">
                Reset Semua Jadwal (Hapus Semua)
            </button>
        </div>
    </div>
</div>
