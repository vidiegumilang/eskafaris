<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Flight Schedule</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #2c3e50; color: white; padding: 10px; }
        nav { background: #1a252f; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        nav a { color: #bdc3c7; text-decoration: none; font-size: 14px; }
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        /* Styling Input Tanggal di Dashboard */
        #dash-date { padding: 5px; border-radius: 4px; border: none; font-family: inherit; font-weight: bold; cursor: pointer; }
        .table-wrapper { background: white; color: black; border-radius: 5px; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; font-size: 10px; }
        .reg-col { background: #34495e; color: white; font-weight: bold; width: 60px; }
        .p-head { color: white; font-weight: bold; }
        .course { background: #d1ecf1; font-weight: bold; width: 45px; }
    </style>
</head>
<body>

<nav>
    <div><strong>FLIGHT OPS MONITOR</strong></div>
    <div class="nav-controls">
        <label for="dash-date">VIEW DATE:</label>
        <input type="date" id="dash-date" onchange="loadData()">
        <a href="admin.html">⚙️ SETTINGS</a>
    </div>
</nav>

<div id="display"></div>

<script>
    // Set default tanggal hari ini saat pertama kali buka
    document.getElementById('dash-date').valueAsDate = new Date();

    const aircrafts = ["AEA", "AEB", "AEC", "AED", "AEE", "AEF", "AEG", "AEH", "AEI", "AEJ", "AEK", "AEL", "AEM", "AEN", "AEO", "AEP", "AEQ", "AER"];
    const pInfo = [
        {h: "1ST (01-02)", c: "#e74c3c"}, {h: "2ND (02:30-03:30)", c: "#e74c3c"},
        {h: "3RD (04-05)", c: "#2980b9"}, {h: "REST (05-06)", c: "#16a085"},
        {h: "4TH (06:30-07:30)", c: "#d35400"}, {h: "5TH (08-09)", c: "#d35400"},
        {h: "6TH (09:30-10:30)", c: "#27ae60"}, {h: "7TH (11-12)", c: "#8e44ad"}
    ];

    function buildTable() {
        let html = "";
        const sessions = [{t: "MORNING", s: 0, e: 4}, {t: "AFTERNOON", s: 4, e: 8}];
        
        sessions.forEach(sess => {
            html += `<h4 style="margin: 10px 0;">${sess.t} SESSION</h4>`;
            html += `<div class="table-wrapper"><table><thead><tr><th rowspan="2" class="reg-col">REG</th>`;
            for(let i=sess.s; i<sess.e; i++) {
                html += `<th colspan="6" class="p-head" style="background:${pInfo[i].c}">${pInfo[i].h}</th><th rowspan="2" class="course">CRS</th>`;
            }
            html += `</tr><tr>`;
            for(let i=sess.s; i<sess.e; i++) html += `<td>FI</td><td>STD</td><td>EXC</td><td>OFF</td><td>ON</td><td>RMK</td>`;
            html += `</tr></thead><tbody>`;
            aircrafts.forEach(r => {
                html += `<tr><td class="reg-col">PK-${r}</td>`;
                for(let i=sess.s; i<sess.e; i++) {
                    const fields = ['fi', 'std', 'exc', 'off', 'on', 'rmk'];
                    // ID tetap sederhana tanpa tanggal agar mudah dimanipulasi DOM
                    fields.forEach(f => html += `<td id="${r}-${i}-${f}">-</td>`);
                    html += `<td class="course" id="${r}-${i}-crs">-</td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
        });
        document.getElementById('display').innerHTML = html;
        loadData();
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('flightDB') || '{}');
        const selectedDate = document.getElementById('dash-date').value;

        // Bersihkan tabel dulu sebelum load data tanggal yang dipilih
        aircrafts.forEach(r => {
            for(let i=0; i<8; i++) {
                const fields = ['fi', 'std', 'exc', 'off', 'on', 'rmk', 'crs'];
                fields.forEach(f => {
                    const cell = document.getElementById(`${r}-${i}-${f}`);
                    if(cell) {
                        cell.innerText = "-";
                        cell.style.background = ""; // Reset warna OK
                        cell.style.color = "";
                    }
                });
            }
        });

        // Load data berdasarkan filter tanggal: TANGGAL-REG-PERIODE-KOLOM
        Object.keys(data).forEach(storageKey => {
            // Cek apakah key diawali dengan tanggal yang dipilih
            if (storageKey.startsWith(selectedDate)) {
                // Ambil bagian ID elemen (buang string tanggalnya)
                const elementId = storageKey.replace(`${selectedDate}-`, "");
                const el = document.getElementById(elementId);
                
                if(el) {
                    const val = data[storageKey];
                    el.innerText = val || "-";
                    
                    // Style khusus jika Remark "OK"
                    if(elementId.endsWith('rmk') && val.toUpperCase() === "OK") {
                        el.style.background = "#2ecc71";
                        el.style.color = "white";
                    }
                }
            }
        });
    }

    window.onload = buildTable;
    // Auto sync data setiap 5 detik
    setInterval(loadData, 5000);
</script>
</body>
</html>
